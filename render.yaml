databases:
  - name: liftoff-postgres
    databaseName: liftoff_db
    plan: free
  - name: liftoff-redis
    plan: free

services:
  - type: web
    name: api-gateway
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheck:
      path: /health
    dockerfilePath: ./apps/api-gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: API_KEY
        value: "your-strong-production-api-key-here"
      - key: TENANT_SERVICE_URL
        fromService:
          type: web
          name: tenant-service
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: REDIS_URL
        fromDatabase:
          name: liftoff-redis
          property: connectionString

  - type: web
    name: tenant-service
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheck:
      path: /health
    internalPort: 3001
    dockerfilePath: ./apps/tenant-service/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liftoff-postgres
          property: connectionString
      - key: AMQP_URL
        value: "amqps://vqfrwqmw:dqOpui_y6M02B-HNpDjNA1994Xl7WH9b@moose.rmq.cloudamqp.com/vqfrwqmw"
      - key: REDIS_URL
        fromDatabase:
          name: liftoff-redis
          property: connectionString

  - type: worker
    name: db-provisioner-service
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./apps/db-provisioner-service/Dockerfile
    dockerContext: .
