      - key: DATABASE_URL
        fromDatabase:
          name: liftoff-postgres
          property: connectionString
      - key: AMQP_URL
        value: "amqps://vqfrwqmw:dqOpui_y6M02B-HNpDjNA1994Xl7WH9b@moose.rmq.cloudamqp.com/vqfrwqmw"

  - type: worker
    name: dns-provisioner-service
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./apps/dns-provisioner-service/Dockerfile
    dockerContext: .
    envVars:
      - key: AMQP_URL
        value: "amqps://vqfrwqmw:dqOpui_y6M02B-HNpDjNA1994Xl7WH9b@moose.rmq.cloudamqp.com/vqfrwqmw"

  - type: worker
    name: credentials-service
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./apps/credentials-service/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liftoff-postgres
          property: connectionString
