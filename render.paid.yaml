databases:
  - name: liftoff-postgres
    databaseName: liftoff_db
    plan: starter  # Paid plan
  - name: liftoff-redis
    plan: starter  # Paid plan

services:
  # API Gateway - Public facing API
  - type: web
    name: api-gateway
    runtime: docker
    plan: starter  # $7/month - No sleep, better performance
    autoDeploy: true
    dockerfilePath: ./apps/api-gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: API_KEY
        generateValue: true
      - key: TENANT_SERVICE_URL
        value: "http://tenant-service:3001"
      - key: REDIS_URL
        fromDatabase:
          name: liftoff-redis
          property: connectionString

  # Tenant Service - Main service
  - type: web
    name: tenant-service
    runtime: docker
    plan: starter  # $7/month - No sleep, better performance
    autoDeploy: true
    dockerfilePath: ./apps/tenant-service/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: liftoff-postgres
          property: connectionString
      - key: AMQP_URL
        value: "amqps://vqfrwqmw:dqOpui_y6M02B-HNpDjNA1994Xl7WH9b@moose.rmq.cloudamqp.com/vqfrwqmw"
      - key: REDIS_URL
        fromDatabase:
          name: liftoff-redis
          property: connectionString

  # DB Provisioner - Background worker (PAID PLAN REQUIRED)
  - type: worker
    name: db-provisioner-service
    runtime: docker
    plan: starter  # $7/month
    autoDeploy: true
    dockerfilePath: ./apps/db-provisioner-service/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: liftoff-postgres
          property: connectionString
      - key: AMQP_URL
        value: "amqps://vqfrwqmw:dqOpui_y6M02B-HNpDjNA1994Xl7WH9b@moose.rmq.cloudamqp.com/vqfrwqmw"

  # DNS Provisioner - Background worker (PAID PLAN REQUIRED)
